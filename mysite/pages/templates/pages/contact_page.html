{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Home</a> <span>/</span> {{ page.title }}
        </div>

        <div class="section-header text-center">
            <h1>{{ page.title }}</h1>
            {% if page.intro %}
                <div class="rich-text text-muted">{{ page.intro|richtext }}</div>
            {% endif %}
        </div>

        <div class="contact-form">
            <form action="{% pageurl page %}" method="POST">
                {% csrf_token %}

                {% for field in form %}
                    <div class="form-group">
                        {{ field.label_tag }}
                        {{ field }}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
