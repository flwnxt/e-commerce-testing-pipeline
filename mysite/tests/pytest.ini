# tests/pytest.ini
# =============================================================================
# Pytest settings for LearnHub test suite
# =============================================================================

[pytest]
# Test file discovery pattern
testpaths = e2e

# Only collect files matching this pattern
python_files = test_*.py

# Only collect classes matching this pattern
python_classes = Test*

# Only collect functions matching this pattern
python_functions = test_*

# Default command-line options:
#   -v           : verbose output (shows each test name)
#   --tb=short   : shorter tracebacks on failure
addopts = -v --tb=short